services:
  postgres:
    image: postgres:16-alpine
    container_name: acromaps-db
    environment:
      POSTGRES_USER: acromaps
      POSTGRES_PASSWORD: acromaps_dev
      POSTGRES_DB: acromaps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acromaps"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
